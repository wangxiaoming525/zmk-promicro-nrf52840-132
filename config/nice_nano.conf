# 启用摇杆HID功能
CONFIG_ZMK_JOYSTICK=y

# 启用蓝牙和USB
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# 启用GPIO直接按键驱动（必须添加，解决找不到kscan的核心问题）
CONFIG_ZMK_GPIO_KEYS=y

# 关闭矩阵键盘扫描（我们用独立共地按键，不需要矩阵）
CONFIG_ZMK_KSCAN_MATRIX=n

# 低功耗休眠配置（单位：毫秒）
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# 关闭串口调试，降低功耗
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
