# 启用摇杆HID功能
CONFIG_ZMK_JOYSTICK=y

# 启用蓝牙和USB
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# 低功耗休眠配置（单位：毫秒）
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000    # 5分钟无操作进入浅休眠
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000 # 30分钟无操作进入深度休眠

# 关闭默认键盘矩阵（我们用独立GPIO按键，不需要矩阵）
CONFIG_ZMK_KSCAN_MATRIX=n

# 关闭串口调试，降低功耗
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
